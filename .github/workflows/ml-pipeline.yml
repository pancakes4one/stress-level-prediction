name: ML Pipeline

# When should this pipeline run?
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual triggering from GitHub UI

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Run tests
  # ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc

      - name: Pull data with DVC
        run: |
          dvc pull -v

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # Job 2: Train and evaluate model
  # ──────────────────────────────────────────────
  train:
    name: Train and Evaluate
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc

      - name: Pull data with DVC
        run: |
          dvc pull -v

      - name: Train model
        run: python src/train.py

      - name: Upload MLflow runs as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/