data:
  path: "data/raw/sleep_stress.csv"
  target_column: "stress_level"
  required_columns:
    - "age"
    - "gender"
    - "occupation"
    - "daily_screen_time_hours"
    - "phone_usage_before_sleep_minutes"
    - "sleep_duration_hours"
    - "sleep_quality_score"
    - "stress_level"
    - "caffeine_intake_cups"
    - "physical_activity_minutes"
    - "notifications_received_per_day"
    - "mental_fatigue_score"
  version: "v1"

preprocessing:
  missing_rate: 0.05
  missing_columns:
    - "sleep_duration_hours"
    - "daily_screen_time_hours"
    - "mental_fatigue_score"
  strategy: mean
  categorical_columns:
    - "gender"
    - "occupation"

model:
  n_estimators: 100
  max_depth: 10

training:
  test_size: 0.2
  random_state: 42
  min_accuracy_threshold: 0.6